repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        name: Remove trailing whitespace
      - id: check-yaml
        name: Check YAML files
      - id: debug-statements
        name: Check for debug statements
      - id: requirements-txt-fixer
        name: Fix requirements.txt files
      - id: check-merge-conflict
        name: Check for merge conflict markers
      - id: check-added-large-files
        name: Check for large files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff-check
        name: "Static code analysis (ruff)"
        args: [--fix] # auto-fix issues if possible
      - id: ruff-check
        name: "Check naming conventions (ruff)"
        args: [--select, N]
      - id: ruff-format
        name: "Code formatting (ruff)"
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.406
    hooks:
      - id: pyright
  - repo: https://github.com/PyCQA/bandit
    rev: "1.8.6"
    hooks:
      - id: bandit
        args:
          [
            "-c",
            "pyproject.toml",
            "-q",
            "--exclude",
            "tests,migrations",
            "--skip",
            "B101",
          ]
        additional_dependencies: ["bandit[toml]"]
        exclude: ".pre-commit-config.yaml"
  - repo: https://github.com/kynan/nbstripout
    rev: 0.8.1
    hooks:
      - id: nbstripout
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
  - repo: https://github.com/DatacationOrg/pre-commit-hooks
    rev: v1.1.0
    hooks:
      - id: check-uv-lock-vulnerabilities
