bundle:
  name: pers_databricks

resources:
  jobs:
    silver_mock:
      name: silver-mock
      environments:
        - environment_key: silver_mock_env
          spec:
            client: "3"
            dependencies:
              - ./dist/pers_databricks-2026.0.0-py3-none-any.whl
      tasks:
        - task_key: run_silver_mock
          environment_key: silver_mock_env
          python_wheel_task:
            package_name: pers-databricks
            entry_point: run-silver-mock
            parameters:
              - --write-mode
              - overwrite